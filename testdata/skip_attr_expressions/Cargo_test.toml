[package]
name = "cargo-mutants-testdata-skip-attr-expressions"
version = "0.0.0"
edition = "2021"
publish = false

# Custom proc-macro attributes on expressions and statements are
# nightly-only on the Rust toolchain, so the source uses
# `#![cfg_attr(mutants_nightly, feature(...))]` to enable the required
# feature gates only when the test is opted in via the `mutants_nightly`
# cfg. See AGENTS.md and the crate-level docs in `src/lib.rs`.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(mutants_nightly)'] }

[dependencies]
mutants = "0.0.3"
